<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img" aria-label="Image format decision guide: choose JPEG for photos, PNG for graphics with transparency, WebP for everything on the web, AVIF for next-gen compression">
  <rect width="760" height="300" rx="16" fill="#f8fafc"/>
  <rect x="1" y="1" width="758" height="298" rx="15" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Title -->
  <text x="380" y="30" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#0f172a">Which image format should you use?</text>

  <!-- Decision node 1: Photo or graphic? -->
  <rect x="280" y="46" width="200" height="40" rx="20" fill="#7c3aed"/>
  <text x="380" y="62" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="white">Is it a photograph?</text>
  <text x="380" y="78" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#ddd6fe">(realistic colours, no sharp edges)</text>

  <!-- YES branch: left -->
  <line x1="310" y1="86" x2="170" y2="130" stroke="#64748b" stroke-width="1.5"/>
  <text x="225" y="114" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#059669">YES</text>

  <!-- NO branch: right -->
  <line x1="450" y1="86" x2="590" y2="130" stroke="#64748b" stroke-width="1.5"/>
  <text x="535" y="114" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#dc2626">NO</text>

  <!-- Node 2a (photo): Need transparency? -->
  <rect x="60" y="130" width="200" height="38" rx="19" fill="#e0e7ff"/>
  <text x="160" y="146" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#3730a3">Need transparency?</text>
  <text x="160" y="161" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#4338ca">(PNG-style alpha channel)</text>

  <!-- Node 2b (graphic): Need transparency? -->
  <rect x="490" y="130" width="210" height="38" rx="19" fill="#e0e7ff"/>
  <text x="595" y="146" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#3730a3">Need transparency?</text>
  <text x="595" y="161" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#4338ca">(logo, icon, or overlay)</text>

  <!-- Photo + No transparency → JPEG / WebP -->
  <line x1="100" y1="168" x2="80" y2="210" stroke="#64748b" stroke-width="1.5"/>
  <text x="76" y="196" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#dc2626">NO</text>

  <!-- Photo + Yes transparency → WebP / AVIF -->
  <line x1="220" y1="168" x2="240" y2="210" stroke="#64748b" stroke-width="1.5"/>
  <text x="248" y="196" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#059669">YES</text>

  <!-- Graphic + No transparency → JPEG / WebP -->
  <line x1="530" y1="168" x2="510" y2="210" stroke="#64748b" stroke-width="1.5"/>
  <text x="506" y="196" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#dc2626">NO</text>

  <!-- Graphic + Yes transparency → PNG / WebP -->
  <line x1="660" y1="168" x2="680" y2="210" stroke="#64748b" stroke-width="1.5"/>
  <text x="686" y="196" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#059669">YES</text>

  <!-- Result boxes -->
  <!-- JPEG / WebP (photo, no transparency) -->
  <rect x="28" y="210" width="116" height="60" rx="10" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="86" y="230" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="800" fill="#92400e">JPEG</text>
  <text x="86" y="244" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#78350f">or WebP for</text>
  <text x="86" y="256" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#78350f">best compression</text>

  <!-- WebP / AVIF (photo, with transparency) -->
  <rect x="188" y="210" width="116" height="60" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="246" y="230" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="800" fill="#065f46">WebP</text>
  <text x="246" y="244" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#166534">supports alpha +</text>
  <text x="246" y="256" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#166534">small file size</text>

  <!-- WebP / JPEG (graphic, no transparency) -->
  <rect x="458" y="210" width="116" height="60" rx="10" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="516" y="230" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="800" fill="#92400e">WebP</text>
  <text x="516" y="244" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#78350f">or JPEG if</text>
  <text x="516" y="256" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#78350f">no transparency</text>

  <!-- PNG / WebP (graphic, with transparency) -->
  <rect x="618" y="210" width="116" height="60" rx="10" fill="#f0f9ff" stroke="#7dd3fc" stroke-width="1.5"/>
  <text x="676" y="230" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="800" fill="#0c4a6e">PNG</text>
  <text x="676" y="244" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#075985">lossless quality</text>
  <text x="676" y="256" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#075985">with full alpha</text>

  <!-- Bottom note -->
  <text x="380" y="287" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">WebP is the safe default for the web — 95%+ browser support, smaller than JPEG/PNG, supports transparency · imagepdf.tools</text>
</svg>
