<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 200" role="img" aria-label="Batch image processing: multiple files go in, all are compressed or resized simultaneously, optimised files come out">
  <rect width="760" height="200" rx="16" fill="#f8fafc"/>
  <rect x="1" y="1" width="758" height="198" rx="15" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="380" y="28" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#0f172a">Batch processing — all files handled in one go</text>

  <defs>
    <marker id="arrB" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#7c3aed"/>
    </marker>
    <marker id="arrG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#059669"/>
    </marker>
  </defs>

  <!-- Input files: 5 file icons stacked/fanned -->
  <!-- File 5 (back) -->
  <rect x="38" y="54" width="54" height="68" rx="6" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1"/>
  <!-- File 4 -->
  <rect x="44" y="50" width="54" height="68" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <!-- File 3 -->
  <rect x="50" y="46" width="54" height="68" rx="6" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <!-- File 2 -->
  <rect x="56" y="42" width="54" height="68" rx="6" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1.5"/>
  <!-- File 1 (front) -->
  <rect x="62" y="38" width="54" height="68" rx="6" fill="white" stroke="#7c3aed" stroke-width="1.5"/>
  <path d="M100 38 v14 h14" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-linejoin="round"/>
  <text x="89" y="70" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="700" fill="#7c3aed">IMG</text>
  <line x1="72" y1="78" x2="106" y2="78" stroke="#c4b5fd" stroke-width="1"/>
  <line x1="72" y1="84" x2="106" y2="84" stroke="#c4b5fd" stroke-width="1"/>
  <line x1="72" y1="90" x2="96" y2="90" stroke="#c4b5fd" stroke-width="1"/>
  <text x="89" y="122" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#4c1d95">5 images</text>
  <text x="89" y="136" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#64748b">total: 22 MB</text>

  <!-- Arrow in -->
  <line x1="128" y1="100" x2="178" y2="100" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrB)"/>

  <!-- Processing box -->
  <rect x="182" y="58" width="206" height="84" rx="12" fill="#7c3aed"/>
  <!-- Spinner-like icon -->
  <circle cx="240" cy="100" r="22" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <path d="M240 78 A22 22 0 0 1 262 100" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <text x="285" y="94" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">Compress</text>
  <text x="285" y="110" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#ddd6fe">Resize · Convert</text>
  <!-- Progress dots -->
  <circle cx="209" cy="152" r="4" fill="#a78bfa"/>
  <circle cx="223" cy="152" r="4" fill="#a78bfa"/>
  <circle cx="237" cy="152" r="4" fill="white"/>
  <circle cx="251" cy="152" r="4" fill="rgba(255,255,255,0.3)"/>
  <circle cx="265" cy="152" r="4" fill="rgba(255,255,255,0.3)"/>

  <!-- Arrow out -->
  <line x1="392" y1="100" x2="442" y2="100" stroke="#059669" stroke-width="2" marker-end="url(#arrG)"/>

  <!-- Output files: 5 file icons, smaller -->
  <rect x="448" y="54" width="54" height="68" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <rect x="454" y="50" width="54" height="68" rx="6" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1"/>
  <rect x="460" y="46" width="54" height="68" rx="6" fill="#ecfdf5" stroke="#34d399" stroke-width="1"/>
  <rect x="466" y="42" width="54" height="68" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="472" y="38" width="54" height="68" rx="6" fill="white" stroke="#059669" stroke-width="1.5"/>
  <path d="M510 38 v14 h14" fill="none" stroke="#059669" stroke-width="1.5" stroke-linejoin="round"/>
  <text x="499" y="70" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="700" fill="#059669">IMG</text>
  <line x1="482" y1="78" x2="516" y2="78" stroke="#86efac" stroke-width="1"/>
  <line x1="482" y1="84" x2="516" y2="84" stroke="#86efac" stroke-width="1"/>
  <line x1="482" y1="90" x2="506" y2="90" stroke="#86efac" stroke-width="1"/>
  <text x="499" y="122" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#065f46">5 images</text>
  <text x="499" y="136" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#64748b">total: 4.8 MB</text>

  <!-- Savings badge -->
  <rect x="568" y="72" width="160" height="56" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="648" y="96" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="800" fill="#059669">−78%</text>
  <text x="648" y="116" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#065f46">total size saved</text>

  <text x="380" y="185" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">Process your entire image library at once — same settings applied to every file · imagepdf.tools</text>
</svg>
