<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 210" role="img" aria-label="Responsive images: browser serves a 480px image to mobile, 768px to tablet, and 1200px to desktop — right size for each device">
  <rect width="760" height="210" rx="16" fill="#f8fafc"/>
  <rect x="1" y="1" width="758" height="208" rx="15" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="380" y="28" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#0f172a">Responsive images — serve the right size for each device</text>

  <!-- Mobile -->
  <rect x="60" y="48" width="54" height="100" rx="6" fill="#1e293b"/>
  <rect x="65" y="56" width="44" height="78" rx="3" fill="#bfdbfe"/>
  <rect x="65" y="56" width="44" height="36" rx="2" fill="#93c5fd"/>
  <rect x="65" y="92" width="44" height="20" fill="#6ee7b7"/>
  <rect x="65" y="112" width="30" height="6" rx="2" fill="rgba(255,255,255,0.5)"/>
  <rect x="65" y="120" width="38" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
  <circle cx="87" cy="140" r="3" fill="#475569"/>
  <text x="87" y="162" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#0f172a">Mobile</text>
  <rect x="50" y="168" width="74" height="22" rx="6" fill="#ede9fe"/>
  <text x="87" y="183" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#5b21b6">480 px · 38 KB</text>

  <!-- Arrow + srcset label -->
  <line x1="120" y1="98" x2="220" y2="98" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Tablet -->
  <rect x="194" y="56" width="110" height="80" rx="6" fill="#1e293b"/>
  <rect x="200" y="62" width="98" height="62" rx="3" fill="#bfdbfe"/>
  <rect x="200" y="62" width="98" height="32" rx="2" fill="#93c5fd"/>
  <rect x="200" y="94" width="98" height="18" fill="#6ee7b7"/>
  <rect x="200" y="112" width="60" height="4" rx="2" fill="rgba(255,255,255,0.5)"/>
  <rect x="200" y="118" width="80" height="3" rx="2" fill="rgba(255,255,255,0.3)"/>
  <text x="249" y="152" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#0f172a">Tablet</text>
  <rect x="199" y="158" width="100" height="22" rx="6" fill="#dbeafe"/>
  <text x="249" y="173" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#1d4ed8">768 px · 89 KB</text>

  <!-- Arrow -->
  <line x1="310" y1="98" x2="370" y2="98" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Desktop -->
  <rect x="366" y="50" width="200" height="120" rx="6" fill="#1e293b"/>
  <rect x="372" y="58" width="188" height="90" rx="3" fill="#bfdbfe"/>
  <rect x="372" y="58" width="188" height="50" rx="2" fill="#93c5fd"/>
  <rect x="372" y="108" width="188" height="28" fill="#6ee7b7"/>
  <rect x="372" y="136" width="188" height="12" rx="1" fill="rgba(255,255,255,0.2)"/>
  <polygon points="372,108 466,66 560,108" fill="#a3a3a3" opacity="0.4"/>
  <circle cx="540" cy="72" r="14" fill="#fde68a"/>
  <text x="466" y="183" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#0f172a">Desktop</text>
  <rect x="388" y="189" width="156" height="22" rx="6" fill="#dcfce7"/>
  <text x="466" y="204" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#065f46">1 200 px · 215 KB</text>

  <!-- srcset code snippet -->
  <rect x="580" y="54" width="162" height="108" rx="10" fill="#1e293b"/>
  <text x="596" y="72" font-family="mono,Consolas,monospace" font-size="8" fill="#94a3b8">&lt;img</text>
  <text x="596" y="84" font-family="mono,Consolas,monospace" font-size="8" fill="#6ee7b7">  srcset=</text>
  <text x="596" y="96" font-family="mono,Consolas,monospace" font-size="8" fill="#fde68a">   "img-480.jpg 480w,</text>
  <text x="596" y="108" font-family="mono,Consolas,monospace" font-size="8" fill="#fde68a">    img-768.jpg 768w,</text>
  <text x="596" y="120" font-family="mono,Consolas,monospace" font-size="8" fill="#fde68a">    img-1200.jpg 1200w"</text>
  <text x="596" y="132" font-family="mono,Consolas,monospace" font-size="8" fill="#6ee7b7">  sizes=</text>
  <text x="596" y="144" font-family="mono,Consolas,monospace" font-size="8" fill="#fde68a">   "100vw"</text>
  <text x="596" y="156" font-family="mono,Consolas,monospace" font-size="8" fill="#94a3b8">/&gt;</text>

  <text x="380" y="200" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">Mobile users download 38 KB instead of 215 KB — 5× less data, much faster page · imagepdf.tools</text>
</svg>
