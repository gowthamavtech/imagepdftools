<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 260" role="img" aria-label="Chart showing how image quality setting affects file size: file size drops steeply from quality 100 to 70, then flattens. The sweet spot is around quality 70-80.">
  <rect width="760" height="260" rx="16" fill="#f8fafc"/>
  <rect x="1" y="1" width="758" height="258" rx="15" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Title -->
  <text x="380" y="30" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#0f172a">Quality setting vs file size — where to set your slider</text>

  <!-- Axes -->
  <line x1="80" y1="40" x2="80" y2="195" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="80" y1="195" x2="700" y2="195" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- Y-axis label -->
  <text transform="translate(22,120) rotate(-90)" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#64748b">File size</text>
  <text x="80" y="45" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">Large</text>
  <text x="80" y="192" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">Small</text>

  <!-- X-axis labels -->
  <text x="380" y="220" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#64748b">Quality setting (JPEG / WebP)</text>
  <text x="82" y="212" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">0</text>
  <text x="200" y="212" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">20</text>
  <text x="320" y="212" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">40</text>
  <text x="440" y="212" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">60</text>
  <text x="560" y="212" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">80</text>
  <text x="676" y="212" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">100</text>

  <!-- X grid lines -->
  <line x1="200" y1="40" x2="200" y2="195" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="320" y1="40" x2="320" y2="195" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="440" y1="40" x2="440" y2="195" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="560" y1="40" x2="560" y2="195" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="680" y1="40" x2="680" y2="195" stroke="#f1f5f9" stroke-width="1"/>

  <!-- Curve: file size rises steeply from Q100 → smaller at Q0. Drawn left=Q0 to right=Q100 -->
  <!-- Points (quality, filesize relative): 0→5, 20→12, 40→28, 60→60, 70→80, 80→118, 90→150, 100→185 -->
  <!-- Map quality 0-100 to x 82-680, size 5-185 to y 190-48 -->
  <!-- x = 82 + quality*5.98, y = 190 - size*0.77 -->
  <path d="M82,186 C110,184 150,182 200,180 C240,178 280,174 320,165 C360,153 395,138 440,118 C475,101 505,86 530,78 C560,68 590,60 620,55 C650,50 665,48 680,47"
        fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round"/>

  <!-- Area under curve -->
  <path d="M82,186 C110,184 150,182 200,180 C240,178 280,174 320,165 C360,153 395,138 440,118 C475,101 505,86 530,78 C560,68 590,60 620,55 C650,50 665,48 680,47 L680,195 L82,195 Z"
        fill="#7c3aed" opacity="0.08"/>

  <!-- Sweet spot vertical line at Q75 (x=82+75*5.98=530) -->
  <line x1="530" y1="40" x2="530" y2="195" stroke="#059669" stroke-width="1.5" stroke-dasharray="5 3"/>

  <!-- Sweet spot callout -->
  <rect x="435" y="42" width="180" height="52" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="525" y="60" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#065f46">Sweet spot: Q 70–80</text>
  <text x="525" y="76" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#166534">Looks great to the eye</text>
  <text x="525" y="89" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#166534">50–75% smaller file</text>

  <!-- Too low callout -->
  <rect x="88" y="155" width="115" height="36" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="145" y="170" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#92400e">Q 0–40</text>
  <text x="145" y="184" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#78350f">Visible artifacts</text>

  <!-- Too high callout -->
  <rect x="618" y="42" width="115" height="36" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="675" y="57" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#991b1b">Q 90–100</text>
  <text x="675" y="71" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#7f1d1d">Barely better,</text>
  <text x="675" y="82" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#7f1d1d">much larger</text>

  <!-- Bottom note -->
  <text x="380" y="244" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">Curve is approximate — exact values vary by image content, format, and encoder · imagepdf.tools</text>
</svg>
