<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 220" role="img" aria-label="Core Web Vitals thresholds: LCP good under 2.5s, CLS good under 0.1, INP good under 200ms — images affect all three">
  <rect width="760" height="220" rx="16" fill="#f8fafc"/>
  <rect x="1" y="1" width="758" height="218" rx="15" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="380" y="30" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#0f172a">Core Web Vitals — how images affect your score</text>

  <!-- LCP card -->
  <rect x="28" y="44" width="218" height="156" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="28" y="44" width="218" height="36" rx="12" fill="#7c3aed"/>
  <rect x="28" y="68" width="218" height="12" fill="#7c3aed"/>
  <text x="137" y="68" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">LCP</text>
  <text x="137" y="83" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#ddd6fe">Largest Contentful Paint</text>
  <!-- Threshold bar -->
  <rect x="44" y="96" width="186" height="12" rx="6" fill="#e2e8f0"/>
  <rect x="44" y="96" width="74" height="12" rx="6" fill="#22c55e"/>
  <rect x="118" y="96" width="62" height="12" rx="0" fill="#f59e0b"/>
  <rect x="180" y="96" width="50" height="12" rx="6" fill="#ef4444"/>
  <text x="81" y="123" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#15803d">Good</text>
  <text x="81" y="136" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#15803d">&lt; 2.5 s</text>
  <text x="149" y="123" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#92400e">OK</text>
  <text x="149" y="136" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#92400e">2.5–4 s</text>
  <text x="205" y="123" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#991b1b">Poor</text>
  <text x="205" y="136" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#991b1b">&gt; 4 s</text>
  <rect x="44" y="146" width="186" height="42" rx="8" fill="#f5f3ff"/>
  <text x="137" y="160" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#5b21b6">Image impact: HIGH</text>
  <text x="137" y="174" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6d28d9">Hero images are usually</text>
  <text x="137" y="184" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6d28d9">the largest element</text>

  <!-- CLS card -->
  <rect x="271" y="44" width="218" height="156" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="271" y="44" width="218" height="36" rx="12" fill="#2563eb"/>
  <rect x="271" y="68" width="218" height="12" fill="#2563eb"/>
  <text x="380" y="68" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">CLS</text>
  <text x="380" y="83" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#bfdbfe">Cumulative Layout Shift</text>
  <!-- Threshold bar -->
  <rect x="287" y="96" width="186" height="12" rx="6" fill="#e2e8f0"/>
  <rect x="287" y="96" width="74" height="12" rx="6" fill="#22c55e"/>
  <rect x="361" y="96" width="62" height="12" rx="0" fill="#f59e0b"/>
  <rect x="423" y="96" width="50" height="12" rx="6" fill="#ef4444"/>
  <text x="324" y="123" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#15803d">Good</text>
  <text x="324" y="136" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#15803d">&lt; 0.1</text>
  <text x="392" y="123" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#92400e">OK</text>
  <text x="392" y="136" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#92400e">0.1–0.25</text>
  <text x="448" y="123" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#991b1b">Poor</text>
  <text x="448" y="136" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#991b1b">&gt; 0.25</text>
  <rect x="287" y="146" width="186" height="42" rx="8" fill="#eff6ff"/>
  <text x="380" y="160" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#1d4ed8">Image impact: HIGH</text>
  <text x="380" y="174" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#1e40af">Images without width/height</text>
  <text x="380" y="184" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#1e40af">cause layout jumps</text>

  <!-- INP card -->
  <rect x="514" y="44" width="218" height="156" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="514" y="44" width="218" height="36" rx="12" fill="#059669"/>
  <rect x="514" y="68" width="218" height="12" fill="#059669"/>
  <text x="623" y="68" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">INP</text>
  <text x="623" y="83" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#a7f3d0">Interaction to Next Paint</text>
  <!-- Threshold bar -->
  <rect x="530" y="96" width="186" height="12" rx="6" fill="#e2e8f0"/>
  <rect x="530" y="96" width="74" height="12" rx="6" fill="#22c55e"/>
  <rect x="604" y="96" width="62" height="12" rx="0" fill="#f59e0b"/>
  <rect x="666" y="96" width="50" height="12" rx="6" fill="#ef4444"/>
  <text x="567" y="123" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#15803d">Good</text>
  <text x="567" y="136" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#15803d">&lt; 200 ms</text>
  <text x="635" y="123" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#92400e">OK</text>
  <text x="635" y="136" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#92400e">200–500ms</text>
  <text x="691" y="123" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#991b1b">Poor</text>
  <text x="691" y="136" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#991b1b">&gt; 500ms</text>
  <rect x="530" y="146" width="186" height="42" rx="8" fill="#ecfdf5"/>
  <text x="623" y="160" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#065f46">Image impact: MEDIUM</text>
  <text x="623" y="174" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#047857">Heavy images block</text>
  <text x="623" y="184" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#047857">the main thread</text>

  <text x="380" y="212" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">Measured by Google for all URLs in Search Console · affects ranking since 2021 · imagepdf.tools</text>
</svg>
