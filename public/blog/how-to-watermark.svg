<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 220" role="img" aria-label="How to watermark a PDF: a diagonal semi-transparent text watermark is overlaid across the PDF page content">
  <rect width="760" height="220" rx="16" fill="#f8fafc"/>
  <rect x="1" y="1" width="758" height="218" rx="15" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="380" y="28" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#0f172a">How to watermark a PDF — overlay text or image on every page</text>

  <defs>
    <marker id="arrW" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Input PDF -->
  <rect x="40" y="48" width="130" height="170" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="56" y="66" width="98" height="8" rx="2" fill="#cbd5e1"/>
  <rect x="56" y="80" width="80" height="6" rx="2" fill="#e2e8f0"/>
  <rect x="56" y="92" width="90" height="6" rx="2" fill="#e2e8f0"/>
  <rect x="56" y="104" width="70" height="6" rx="2" fill="#e2e8f0"/>
  <rect x="56" y="118" width="98" height="40" rx="3" fill="#f1f5f9"/>
  <rect x="56" y="164" width="90" height="6" rx="2" fill="#e2e8f0"/>
  <rect x="56" y="176" width="75" height="6" rx="2" fill="#e2e8f0"/>
  <rect x="56" y="188" width="60" height="6" rx="2" fill="#e2e8f0"/>
  <text x="105" y="44" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#64748b">Original PDF</text>

  <!-- Arrow 1 -->
  <line x1="178" y1="133" x2="228" y2="133" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrW)"/>

  <!-- Watermark settings panel -->
  <rect x="234" y="55" width="150" height="156" rx="8" fill="#faf5ff" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="309" y="74" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#5b21b6">Watermark Settings</text>
  <text x="248" y="92" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#64748b">Text</text>
  <rect x="248" y="96" width="120" height="18" rx="4" fill="white" stroke="#a78bfa" stroke-width="1"/>
  <text x="256" y="109" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#7c3aed">CONFIDENTIAL</text>
  <text x="248" y="127" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#64748b">Opacity: 30%</text>
  <rect x="248" y="131" width="120" height="6" rx="3" fill="#e2e8f0"/>
  <rect x="248" y="131" width="36" height="6" rx="3" fill="#7c3aed"/>
  <circle cx="284" cy="134" r="5" fill="white" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="248" y="152" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#64748b">Angle: 45°</text>
  <rect x="248" y="156" width="120" height="6" rx="3" fill="#e2e8f0"/>
  <rect x="248" y="156" width="60" height="6" rx="3" fill="#7c3aed"/>
  <circle cx="308" cy="159" r="5" fill="white" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="248" y="177" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#64748b">Colour</text>
  <rect x="248" y="181" width="18" height="14" rx="3" fill="#dc2626"/>
  <rect x="270" y="181" width="18" height="14" rx="3" fill="#7c3aed"/>
  <rect x="292" y="181" width="18" height="14" rx="3" fill="#0f172a" stroke="#a78bfa" stroke-width="1.5"/>
  <rect x="314" y="181" width="18" height="14" rx="3" fill="#94a3b8"/>
  <text x="248" y="207" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#64748b">Apply to: All pages</text>

  <!-- Arrow 2 -->
  <line x1="390" y1="133" x2="440" y2="133" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrW)"/>

  <!-- Output PDF with watermark -->
  <rect x="446" y="48" width="130" height="170" rx="8" fill="white" stroke="#059669" stroke-width="2"/>
  <rect x="462" y="66" width="98" height="8" rx="2" fill="#cbd5e1"/>
  <rect x="462" y="80" width="80" height="6" rx="2" fill="#e2e8f0"/>
  <rect x="462" y="92" width="90" height="6" rx="2" fill="#e2e8f0"/>
  <rect x="462" y="104" width="70" height="6" rx="2" fill="#e2e8f0"/>
  <rect x="462" y="118" width="98" height="40" rx="3" fill="#f1f5f9"/>
  <rect x="462" y="164" width="90" height="6" rx="2" fill="#e2e8f0"/>
  <rect x="462" y="176" width="75" height="6" rx="2" fill="#e2e8f0"/>
  <rect x="462" y="188" width="60" height="6" rx="2" fill="#e2e8f0"/>
  <g transform="translate(511, 133) rotate(-45)">
    <text x="0" y="0" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="800" fill="#dc2626" opacity="0.28" letter-spacing="2">CONFIDENTIAL</text>
  </g>
  <text x="511" y="44" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#065f46">Watermarked PDF</text>

  <!-- Right panel -->
  <rect x="596" y="55" width="144" height="156" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="668" y="74" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#065f46">Common uses</text>
  <text x="610" y="91" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#047857">● CONFIDENTIAL</text>
  <text x="622" y="103" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#64748b">Internal documents</text>
  <text x="610" y="118" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#047857">● DRAFT</text>
  <text x="622" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#64748b">Work in progress</text>
  <text x="610" y="145" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#047857">● © Company 2026</text>
  <text x="622" y="157" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#64748b">Copyright notice</text>
  <text x="610" y="172" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#047857">● DO NOT COPY</text>
  <text x="622" y="184" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#64748b">Distribution control</text>
  <text x="610" y="199" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#047857">● Logo image</text>
  <text x="622" y="211" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#64748b">Brand identity</text>

  <text x="380" y="213" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">Set opacity to 20–40% so the watermark is visible but does not obscure the content · imagepdf.tools</text>
</svg>
