<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 240" role="img" aria-label="PDF compression levels comparison: low compression keeps high quality but large file, medium compression balances quality and size, high compression gives smallest file with some quality loss">
  <rect width="760" height="240" rx="16" fill="#f8fafc"/>
  <rect x="1" y="1" width="758" height="238" rx="15" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Title -->
  <text x="380" y="30" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#0f172a">PDF compression levels — which should you choose?</text>

  <!-- Dividers -->
  <line x1="252" y1="44" x2="252" y2="205" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="506" y1="44" x2="506" y2="205" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- ── LOW / SCREEN ── -->
  <text x="126" y="58" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#64748b">Low Compression</text>
  <text x="126" y="73" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">"Screen quality"</text>
  <!-- PDF icon — large -->
  <rect x="72" y="86" width="52" height="68" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5"/>
  <path d="M106 86 v14 h14" fill="none" stroke="#fca5a5" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M106 86 L120 100 L120 154 H72 V86 Z" fill="none" stroke="#fca5a5" stroke-width="1.5" stroke-linejoin="round"/>
  <text x="89" y="122" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="700" fill="#dc2626">PDF</text>
  <line x1="78" y1="132" x2="110" y2="132" stroke="#fca5a5" stroke-width="1"/>
  <line x1="78" y1="139" x2="110" y2="139" stroke="#fca5a5" stroke-width="1"/>
  <line x1="78" y1="146" x2="100" y2="146" stroke="#fca5a5" stroke-width="1"/>
  <!-- Size bar: large -->
  <rect x="148" y="100" width="18" height="54" rx="3" fill="#fca5a5"/>
  <text x="157" y="98" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#dc2626">8 MB</text>
  <!-- Labels -->
  <text x="126" y="174" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#0f172a">Best quality</text>
  <text x="126" y="188" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b">Crisp text, full-res images</text>
  <!-- Best for -->
  <rect x="48" y="200" width="158" height="22" rx="6" fill="#f1f5f9"/>
  <text x="127" y="215" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Best for: printing, archiving</text>

  <!-- ── MEDIUM ── -->
  <text x="379" y="58" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7c3aed">Medium Compression</text>
  <text x="379" y="73" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#a78bfa">"eBook / balanced"</text>
  <!-- PDF icon — medium -->
  <rect x="318" y="92" width="46" height="62" rx="6" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.5"/>
  <path d="M347 92 v12 h12" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M347 92 L359 104 L359 154 H318 V92 Z" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-linejoin="round"/>
  <text x="335" y="120" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="700" fill="#7c3aed">PDF</text>
  <line x1="324" y1="128" x2="353" y2="128" stroke="#a78bfa" stroke-width="1"/>
  <line x1="324" y1="135" x2="353" y2="135" stroke="#a78bfa" stroke-width="1"/>
  <line x1="324" y1="142" x2="344" y2="142" stroke="#a78bfa" stroke-width="1"/>
  <!-- Size bar: medium -->
  <rect x="380" y="112" width="18" height="34" rx="3" fill="#a78bfa"/>
  <text x="389" y="110" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#7c3aed">2.5 MB</text>
  <!-- Labels -->
  <text x="379" y="174" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#0f172a">Good balance</text>
  <text x="379" y="188" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b">Readable text, smaller images</text>
  <!-- Best for -->
  <rect x="302" y="200" width="158" height="22" rx="6" fill="#ede9fe"/>
  <text x="381" y="215" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5b21b6">Best for: email, sharing</text>

  <!-- ── HIGH ── -->
  <text x="632" y="58" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#059669">High Compression</text>
  <text x="632" y="73" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6ee7b7">"Smallest file"</text>
  <!-- PDF icon — small -->
  <rect x="580" y="100" width="38" height="54" rx="6" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1.5"/>
  <path d="M603 100 v11 h11" fill="none" stroke="#6ee7b7" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M603 100 L614 111 L614 154 H580 V100 Z" fill="none" stroke="#6ee7b7" stroke-width="1.5" stroke-linejoin="round"/>
  <text x="596" y="125" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="7" font-weight="700" fill="#059669">PDF</text>
  <line x1="585" y1="132" x2="608" y2="132" stroke="#6ee7b7" stroke-width="1"/>
  <line x1="585" y1="139" x2="608" y2="139" stroke="#6ee7b7" stroke-width="1"/>
  <!-- Size bar: small -->
  <rect x="636" y="130" width="18" height="16" rx="3" fill="#6ee7b7"/>
  <text x="645" y="128" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#059669">0.8 MB</text>
  <!-- Labels -->
  <text x="632" y="174" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#0f172a">Smallest file</text>
  <text x="632" y="188" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b">Images may appear soft</text>
  <!-- Best for -->
  <rect x="556" y="200" width="158" height="22" rx="6" fill="#d1fae5"/>
  <text x="635" y="215" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#065f46">Best for: web, upload limits</text>

  <!-- Arrow showing progression -->
  <text x="380" y="232" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">← Higher quality, larger file ·  ·  ·  ·  Smaller file, lower quality →</text>
</svg>
