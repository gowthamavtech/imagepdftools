<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 220" role="img" aria-label="HEIC to JPG conversion: HEIC files from iPhone are not supported on Windows or web, but after conversion they become universally compatible JPG files">
  <rect width="760" height="220" rx="16" fill="#f8fafc"/>
  <rect x="1" y="1" width="758" height="218" rx="15" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="380" y="28" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#0f172a">HEIC to JPG — convert iPhone photos for universal compatibility</text>

  <defs>
    <marker id="arrF" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- HEIC file card -->
  <rect x="32" y="44" width="170" height="148" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="32" y="44" width="170" height="48" rx="10" fill="#1e293b"/>
  <rect x="32" y="76" width="170" height="16" fill="#1e293b"/>
  <rect x="52" y="54" width="34" height="28" rx="4" fill="#334155"/>
  <text x="69" y="73" text-anchor="middle" font-family="mono,Consolas,monospace" font-size="9" font-weight="700" fill="#7dd3fc">HEIC</text>
  <text x="100" y="67" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="white">photo.heic</text>
  <text x="100" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#94a3b8">4.1 MB · iPhone 15</text>
  <text x="48" y="110" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#0f172a">Compatibility</text>
  <text x="48" y="126" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#22c55e">✓ iPhone / Mac</text>
  <text x="48" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#dc2626">✗ Windows</text>
  <text x="48" y="154" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#dc2626">✗ Android</text>
  <text x="48" y="168" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#dc2626">✗ Web browsers</text>
  <text x="48" y="182" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#dc2626">✗ Social media</text>

  <!-- Arrow -->
  <line x1="210" y1="118" x2="264" y2="118" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrF)"/>
  <rect x="218" y="100" width="40" height="36" rx="6" fill="#ede9fe"/>
  <text x="238" y="115" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="700" fill="#5b21b6">convert</text>
  <text x="238" y="127" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#7c3aed">in browser</text>

  <!-- JPG file card -->
  <rect x="272" y="44" width="170" height="148" rx="10" fill="white" stroke="#059669" stroke-width="2"/>
  <rect x="272" y="44" width="170" height="48" rx="10" fill="#064e3b"/>
  <rect x="272" y="76" width="170" height="16" fill="#064e3b"/>
  <rect x="292" y="54" width="34" height="28" rx="4" fill="#065f46"/>
  <text x="309" y="73" text-anchor="middle" font-family="mono,Consolas,monospace" font-size="10" font-weight="700" fill="#6ee7b7">JPG</text>
  <text x="340" y="67" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="white">photo.jpg</text>
  <text x="340" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6ee7b7">2.8 MB · 90% quality</text>
  <text x="288" y="110" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#0f172a">Compatibility</text>
  <text x="288" y="126" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#22c55e">✓ iPhone / Mac</text>
  <text x="288" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#22c55e">✓ Windows</text>
  <text x="288" y="154" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#22c55e">✓ Android</text>
  <text x="288" y="168" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#22c55e">✓ Web browsers</text>
  <text x="288" y="182" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#22c55e">✓ Social media</text>

  <!-- Format comparison table -->
  <rect x="462" y="44" width="274" height="148" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="599" y="64" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#0f172a">Format comparison</text>
  <rect x="462" y="70" width="274" height="20" fill="#f8fafc"/>
  <text x="530" y="83" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="700" fill="#64748b">HEIC</text>
  <text x="636" y="83" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="700" fill="#64748b">JPG</text>
  <text x="708" y="83" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="700" fill="#64748b">WebP</text>
  <text x="476" y="102" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#64748b">File size</text>
  <text x="530" y="102" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#0f172a">Small</text>
  <text x="636" y="102" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#0f172a">Medium</text>
  <text x="708" y="102" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#0f172a">Smallest</text>
  <line x1="462" y1="108" x2="736" y2="108" stroke="#f1f5f9" stroke-width="1"/>
  <text x="476" y="122" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#64748b">Support</text>
  <text x="530" y="122" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#dc2626">Apple only</text>
  <text x="636" y="122" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#22c55e">Universal</text>
  <text x="708" y="122" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#f59e0b">Most browsers</text>
  <line x1="462" y1="128" x2="736" y2="128" stroke="#f1f5f9" stroke-width="1"/>
  <text x="476" y="142" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#64748b">Quality</text>
  <text x="530" y="142" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#22c55e">Excellent</text>
  <text x="636" y="142" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#22c55e">Excellent</text>
  <text x="708" y="142" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#22c55e">Excellent</text>
  <line x1="462" y1="148" x2="736" y2="148" stroke="#f1f5f9" stroke-width="1"/>
  <text x="476" y="162" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#64748b">Transparency</text>
  <text x="530" y="162" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#22c55e">Yes</text>
  <text x="636" y="162" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#dc2626">No</text>
  <text x="708" y="162" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#22c55e">Yes</text>
  <line x1="462" y1="168" x2="736" y2="168" stroke="#f1f5f9" stroke-width="1"/>
  <text x="476" y="182" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#64748b">Share / upload</text>
  <text x="530" y="182" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#dc2626">Limited</text>
  <text x="636" y="182" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#22c55e">Anywhere</text>
  <text x="708" y="182" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#22c55e">Most sites</text>

  <text x="380" y="208" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">iPhones shoot HEIC by default since iOS 11 — convert before sharing with non-Apple users · imagepdf.tools</text>
</svg>
